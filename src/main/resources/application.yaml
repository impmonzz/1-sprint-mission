spring:
  application:
    name: discodeit

  servlet:
    multipart:
      maxFileSize: 10MB  # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: always  # 스키마 초기화 실행
      schema-locations: classpath:schema.sql  # schema.sql 파일 실행

  jpa:
    hibernate:
      ddl-auto: none  # Hibernate가 DDL 생성 안 하도록 (schema.sql만 실행)
    properties:
      hibernate:
        format_sql: true  # SQL 포맷팅 (더 읽기 쉽게)

discodeit:

   repository:
     type: file
     file-directory: .discodeit

   storage:
    # BinaryContentStorage 구현체로 local 디스크 방식을 사용
    type: local

    # local일 때 사용할 루트 경로 설정
    local:
      root-path: ./upload

logging:
  level:
    org.hibernate.SQL: debug  # Hibernate가 실행하는 SQL 로그 출력
    org.hibernate.type.descriptor.sql.BasicBinder: trace  # 바인딩된 실제 파라미터 출력
